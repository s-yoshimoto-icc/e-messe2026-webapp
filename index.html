<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-messe Personality Test</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Header with Home Button -->
        <header class="header">
            <div class="header-top">
                <button id="home-btn" class="home-btn" title="ホームへ戻る">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                </button>
                <div class="step-indicator">
                    <span id="step-name">性格診断</span>
                    <span id="question-count">設問 1 / 8</span>
                </div>
            </div>
            <div class="progress-bar-container">
                <div id="progress" class="progress-bar" style="width: 0%;"></div>
            </div>
        </header>

        <main class="main-content">
            <div id="content-area">
                <!-- NEW: Initial Branch Screen (Step 0) -->
                <div id="initial-branch-screen" class="screen welcome-container">
                    <span class="subtitle">Exhibition 2026</span>
                    <h1 class="title">ようこそ！</h1>
                    <p class="description">
                        診断をはじめる前に、<br>あなたの現在の状況を教えてください。
                    </p>
                    <div class="options-stack">
                        <button id="main-btn-student" class="btn btn-primary">学生の方はこちら</button>
                        <button id="main-btn-worker" class="btn btn-accent">社会人の方はこちら</button>
                    </div>
                </div>

                <!-- Welcome Screen (Step 1) -->
                <div id="welcome-screen" class="screen welcome-container hidden">
                    <span class="subtitle">Personality Test</span>
                    <h1 class="title">性格診断テスト</h1>
                    <p class="description">
                        あなたの強みを発見し、<br>
                        最適なビジネスフィールドを診断します。
                    </p>
                    <button id="start-btn" class="btn btn-accent btn-large">性格診断を開始する</button>
                    <div style="margin-top: 20px; font-size: 0.8rem; color: #94A3B8;">所要時間：約2分</div>
                </div>

                <!-- Questions Area -->
                <div id="question-screen" class="screen hidden">
                    <h2 id="question-text" class="question-title"></h2>
                    <div id="options-container" class="options-stack">
                        <!-- Options generated by JS -->
                    </div>
                    <!-- Back Button -->
                    <div id="p1-back-btn-container" class="bottom-nav hidden">
                        <button id="p1-back-btn" class="text-link-btn" style="margin-top: 20px;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px; vertical-align: text-bottom;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                            1つ前の設問に戻る
                        </button>
                    </div>
                </div>

                <!-- Result Screen -->
                <div id="p1-result-screen" class="screen hidden">
                    <div class="result-card fade-in">
                        <span id="p1-icon" class="result-icon">🏛</span>
                        <h2 class="result-label">あなたの性格タイプは…</h2>
                        <h3 id="p1-title" class="result-main-title"></h3>
                        <div id="p1-description" class="result-text"></div>
                        
                        <h2 class="result-label">あなたに合うブースはこちら</h2>
                        <h3 id="p1-booth-title" class="result-main-title" style="margin-bottom: 25px; font-size: 1.4rem;"></h3>
                        
                        <div id="p1-actions" class="result-actions">
                            <!-- Buttons generated by p1.js -->
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer-branding">
            e-messe 2026 | Powered by e-bookAC
        </footer>
    </div>
    <script src="p1.js"></script>
</body>
</html>
